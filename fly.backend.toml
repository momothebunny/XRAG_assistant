# fly.toml — Aurelia BACKEND (FastAPI)
#
# Deploy from the repo root:
#   fly launch --config fly.backend.toml --no-deploy --copy-config --name aurelia-backend
#   fly volumes create aurelia_data --region ams --size 3 --app aurelia-backend
#   fly secrets set --app aurelia-backend `
#       XRAG_AUTH_DEV_MODE=0 `
#       XRAG_SMTP_HOST=smtp.example.com `
#       XRAG_SMTP_USER=... `
#       XRAG_SMTP_PASSWORD=... `
#       XRAG_SMTP_FROM=noreply@example.com
#   fly deploy --config fly.backend.toml

app = "aurelia-backend"
primary_region = "ams"

[build]
  dockerfile = "docker/backend.Dockerfile"

[env]
  XRAG_DATA_DIR = "/data"
  PORT = "8001"

[[mounts]]
  source = "aurelia_data"
  destination = "/data"

[http_service]
  internal_port = 8001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 40

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "20s"
  method = "GET"
  path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
