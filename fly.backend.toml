# fly.toml app configuration file generated for aurelia-backend on 2026-05-04T16:35:25+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'aurelia-backend'
primary_region = 'ams'

[build]
  dockerfile = 'docker/backend.Dockerfile'

[env]
  PORT = '8001'
  XRAG_DATA_DIR = '/data'

[[mounts]]
  source = 'aurelia_data'
  destination = '/data'

[http_service]
  internal_port = 8001
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 40
    soft_limit = 20

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    # 60s gives the Python app (with OCR/ML deps) enough time to fully
    # initialise before health checks start — prevents premature failures.
    grace_period = '60s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
