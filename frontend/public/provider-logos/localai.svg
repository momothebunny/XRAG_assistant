<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark inverted triangle background -->
  <polygon points="50,5 95,80 5,80" fill="#0f1f2e" stroke="#1a3a50" stroke-width="1.5"/>
  <!-- Speed lines (purple/teal) -->
  <line x1="62" y1="52" x2="90" y2="52" stroke="#7c5cbf" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>
  <line x1="66" y1="58" x2="88" y2="58" stroke="#00bcd4" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
  <line x1="68" y1="63" x2="86" y2="63" stroke="#7c5cbf" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="70" y1="68" x2="84" y2="68" stroke="#00bcd4" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="71" y1="72" x2="82" y2="72" stroke="#7c5cbf" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <!-- Llama head (teal/cyan) -->
  <ellipse cx="45" cy="52" rx="16" ry="19" fill="#29b6c8"/>
  <!-- Neck -->
  <rect x="38" y="63" width="14" height="14" rx="4" fill="#29b6c8"/>
  <!-- Ear left -->
  <ellipse cx="34" cy="36" rx="5" ry="9" fill="#29b6c8" transform="rotate(-10,34,36)"/>
  <ellipse cx="34" cy="37" rx="2.5" ry="5.5" fill="#1a7a88" transform="rotate(-10,34,37)"/>
  <!-- Ear right -->
  <ellipse cx="56" cy="35" rx="5" ry="9" fill="#29b6c8" transform="rotate(10,56,35)"/>
  <ellipse cx="56" cy="36" rx="2.5" ry="5.5" fill="#1a7a88" transform="rotate(10,56,36)"/>
  <!-- Snout -->
  <ellipse cx="46" cy="62" rx="8" ry="6" fill="#1f8fa0"/>
  <ellipse cx="46" cy="63" rx="5" ry="4" fill="#3dbecf" opacity="0.6"/>
  <!-- Nostrils -->
  <ellipse cx="43" cy="63" rx="1.5" ry="2" fill="#0d5a6a"/>
  <ellipse cx="49" cy="63" rx="1.5" ry="2" fill="#0d5a6a"/>
  <!-- Eyes -->
  <ellipse cx="39" cy="50" rx="3.5" ry="3.5" fill="#0d1f2d"/>
  <ellipse cx="51" cy="50" rx="3.5" ry="3.5" fill="#0d1f2d"/>
  <!-- Sunglasses frame -->
  <rect x="33" y="47" width="10" height="7" rx="2" fill="none" stroke="white" stroke-width="1.5"/>
  <rect x="45" y="47" width="10" height="7" rx="2" fill="none" stroke="white" stroke-width="1.5"/>
  <line x1="43" y1="50.5" x2="45" y2="50.5" stroke="white" stroke-width="1.5"/>
  <line x1="33" y1="50.5" x2="30" y2="49.5" stroke="white" stroke-width="1.5"/>
  <line x1="55" y1="50.5" x2="58" y2="49.5" stroke="white" stroke-width="1.5"/>
  <!-- Glasses lenses tint -->
  <rect x="33.5" y="47.5" width="9" height="6" rx="1.5" fill="#1a3a50" opacity="0.8"/>
  <rect x="45.5" y="47.5" width="9" height="6" rx="1.5" fill="#1a3a50" opacity="0.8"/>
  <!-- LOCALAI label box -->
  <rect x="5" y="83" width="90" height="14" rx="3" fill="#0f1f2e" stroke="#2a4a60" stroke-width="1.2"/>
  <text x="50" y="93.5" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900" font-size="9.5" fill="#d4dde8" letter-spacing="1">LOCALAI</text>
</svg>
