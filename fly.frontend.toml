# fly.toml app configuration file generated for aurelia-frontend on 2026-05-04T16:38:55+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'aurelia-frontend'
primary_region = 'ams'

[build]
  dockerfile = 'docker/frontend.Dockerfile'

  [build.args]
    # Must be EMPTY: every endpoint in frontend/src/services/xragApi.js
    # already includes the leading "/api/..." prefix, and nginx in the
    # frontend container proxies /api/ -> $BACKEND_URL/api/. Setting this
    # to "/api" causes the SPA to call /api/api/... and get 404s.
    VITE_XRAG_API_BASE_URL = ''

[env]
  BACKEND_URL = 'http://aurelia-backend.internal:8001'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 400
    soft_limit = 200

  [[http_service.checks]]
    interval = '30s'
    timeout = '3s'
    grace_period = '5s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
